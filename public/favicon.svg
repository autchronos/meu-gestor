<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Autchronos">
  <!--
    PLACEHOLDER honesto ate a marca definitiva.
    Monograma "A" em azul-petroleo (--cor-marca do tema claro) sobre o fundo
    creme do app. Sem glow, sem neon, sem gradiente: traco geometrico de
    espessura constante, coerente com a Space Grotesk.
    As cores sao literais aqui de proposito — um favicon nao enxerga os tokens
    de src/index.css. Se a paleta mudar la, mude aqui tambem.
  -->
  <rect width="64" height="64" rx="14" fill="#F6F7F3" />
  <path
    d="M17 47 L32 17 L47 47"
    fill="none"
    stroke="#1E3A5F"
    stroke-width="6"
    stroke-linecap="square"
    stroke-linejoin="round"
  />
  <path d="M24 37 H40" fill="none" stroke="#1E3A5F" stroke-width="6" stroke-linecap="square" />
</svg>
